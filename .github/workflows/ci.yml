name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    backend-build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod
                  cache: true
                  cache-dependency-path: src/backend/go.sum

            - name: Build
              run: go build ./...
              working-directory: src/backend

    backend-vet:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod
                  cache: true
                  cache-dependency-path: src/backend/go.sum

            - name: Run go vet
              run: go vet ./...
              working-directory: src/backend

            - name: Check gofmt
              run: test -z "$(gofmt -l .)"
              working-directory: src/backend

    frontend-build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Build
              run: npm run build
              working-directory: src/frontend

    frontend-lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Lint
              run: npm run lint
              working-directory: src/frontend

    frontend-format:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Check formatting
              run: npm run format
              working-directory: src/frontend

    backend-test:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod
                  cache: true
                  cache-dependency-path: src/backend/go.sum

            - name: Run tests
              run: go test ./...
              working-directory: src/backend

    docker-build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build backend image
              uses: docker/build-push-action@v6
              with:
                  context: src/backend
                  push: false
                  cache-from: type=gha,scope=backend
                  cache-to: type=gha,mode=max,scope=backend

            - name: Build frontend image
              uses: docker/build-push-action@v6
              with:
                  context: src/frontend
                  push: false
                  cache-from: type=gha,scope=frontend
                  cache-to: type=gha,mode=max,scope=frontend
