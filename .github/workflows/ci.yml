name: CI

on:
    pull_request:
        branches: [main]

jobs:
    backend-build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod

            - name: Build
              run: go build ./...
              working-directory: src/backend

    backend-vet:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod

            - name: Run go vet
              run: go vet ./...
              working-directory: src/backend

    frontend-build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Build
              run: npm run build
              working-directory: src/frontend

    frontend-lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Lint
              run: npm run lint
              working-directory: src/frontend

    frontend-format:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: src/frontend

            - name: Check formatting
              run: npx prettier --check .
              working-directory: src/frontend

    backend-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/backend/go.mod

            - name: Run tests
              run: go test ./...
              working-directory: src/backend
