services:

  cert_generator:
    container_name: cert_generator
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.22
        RUN apk update && apk add --no-cache openssl
    volumes:
      - cert_data:/certs
      - ./cert_generator/certs_entrypoint.sh:/usr/local/bin/certs_entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/certs_entrypoint.sh"]
    user: root

  frontend:
    container_name: frontend
    build: ./frontend
    image: transcendence_frontend:dev_1.0
    pull_policy: build
    volumes:
      - ./frontend/src:/app/src
    networks:
      - transcendence_network
    restart: unless-stopped

  reverse_proxy:
    container_name: reverse_proxy
    image: nginx:1.29.8-alpine
    volumes:
      - ./reverse_proxy/templates:/etc/nginx/templates
    ports:
      - "127.0.0.1:${NGINX_PORT_EXTERNAL:-8080}:${NGINX_PORT_INTERNAL:-80}"
    environment:
      - NGINX_PORT_INTERNAL=${NGINX_PORT_INTERNAL:-80}
    networks:
      - transcendence_network
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  backend:
    container_name: backend
    build: ./backend
    image: transcendence_backend:dev_1.0
    pull_policy: build
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_KEY: ${CLOUDINARY_KEY}
    volumes:
      - cert_data
    networks:
      - transcendence_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
      - cert_data:/certs:ro
    networks:
      - transcendence_network
    expose:
      - "${POSTGRES_PORT_INTERNAL:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    depends_on:
      cert_generator:
        condition: service_completed_successfully

  adminer:
    container_name: adminer
    image: adminer:5.4.2
    networks:
      - transcendence_network
    ports:
      - "127.0.0.1:${ADMINER_PORT_EXTERNAL:-8081}:${ADMINER_PORT_INTERNAL:-8080}"
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
  cert_data:

networks:
  transcendence_network:
    driver: bridge
